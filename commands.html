<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Commands — Chrxmaticc AI</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .commands-page {
      min-height: 100vh;
      padding: 120px 40px 80px;
      max-width: 800px;
      margin: 0 auto;
    }
    .commands-page h2 {
      font-size: 2.5rem;
      background: linear-gradient(135deg, #fff, #aaa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
      margin-bottom: 8px;
    }
    .command-count {
      text-align: center;
      color: rgba(255,255,255,0.3);
      margin-bottom: 40px;
      font-size: 0.9rem;
    }
    .command-card {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 12px;
      margin-bottom: 10px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .command-card:hover {
      border-color: rgba(255,255,255,0.1);
    }
    .command-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      cursor: pointer;
      user-select: none;
    }
    .command-header .name {
      font-size: 1.05rem;
      color: #fff;
      font-weight: bold;
    }
    .command-header .arrow {
      color: rgba(255,255,255,0.3);
      transition: transform 0.2s;
      font-size: 1.2rem;
    }
    .command-card.open .arrow {
      transform: rotate(180deg);
    }
    .command-body {
      display: none;
      padding: 0 20px 20px;
      border-top: 1px solid rgba(255,255,255,0.04);
    }
    .command-card.open .command-body {
      display: block;
    }
    .command-body .desc {
      color: rgba(255,255,255,0.4);
      font-size: 0.9rem;
      padding: 14px 0;
      line-height: 1.5;
    }
    .copy-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: #aaa;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.2s;
    }
    .copy-btn:hover {
      background: rgba(255,255,255,0.12);
      color: #fff;
    }
    .copy-btn.copied {
      background: rgba(0,200,100,0.2);
      border-color: rgba(0,200,100,0.3);
      color: #00c864;
    }
    .param-list {
      margin-top: 12px;
    }
    .param-list h4 {
      color: rgba(255,255,255,0.5);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .param-item {
      background: rgba(255,255,255,0.03);
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 6px;
      font-size: 0.85rem;
    }
    .param-item .pname {
      color: #9146ff;
      font-weight: bold;
    }
    .param-item .ptype {
      color: rgba(255,255,255,0.25);
      font-size: 0.75rem;
      margin-left: 6px;
    }
    .param-item .pdesc {
      color: rgba(255,255,255,0.4);
      font-size: 0.8rem;
      display: block;
      margin-top: 3px;
    }
    .param-item .prequired {
      color: #ff4444;
      font-size: 0.7rem;
      margin-left: 4px;
    }
    .param-item .choices {
      margin-top: 6px;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .param-item .choice-chip {
      background: rgba(145,70,255,0.15);
      color: rgba(255,255,255,0.6);
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 0.7rem;
    }
    .loading-text {
      text-align: center;
      color: rgba(255,255,255,0.3);
      padding: 60px;
    }
    .search-box {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      color: #fff;
      padding: 12px 16px;
      font-size: 0.9rem;
      margin-bottom: 24px;
      outline: none;
    }
    .search-box:focus {
      border-color: rgba(255,255,255,0.2);
    }
  </style>
</head>
<body>
  <header class="topbar">
    <span class="logo">Chrxmaticc AI</span>
    <nav>
      <a href="index.html">Home</a>
      <a href="features.html">Features</a>
      <a href="commands.html">Commands</a>
      <a href="faq.html">FAQ</a>
      <a href="embed-builder.html">Embed Builder</a>
    </nav>
  </header>

  <section class="commands-page">
    <h2>Commands</h2>
    <p class="command-count" id="count">Loading...</p>
    <input type="text" class="search-box" id="search" placeholder="Search commands..." oninput="filterCommands()">
    <div id="commands-container"><p class="loading-text">Fetching commands from the bot...</p></div>
  </section>

  <footer class="footer">
    Chrxmaticc AI &copy; 2026 &mdash; <a href="https://github.com/Chrxmaticc">GitHub</a> &middot; <a href="https://twitch.tv/chrxmeelst">Twitch</a>
  </footer>

  <script>
    let allCommands = [];

    async function loadCommands() {
      const container = document.getElementById('commands-container');
      const countEl = document.getElementById('count');
      try {
        const res = await fetch('https://chrxmee-ai-discord-bot.onrender.com/commands');
        allCommands = await res.json();

        if (!allCommands.length) {
          container.innerHTML = '<p class="loading-text">No commands found. Bot might be restarting.</p>';
          countEl.textContent = '';
          return;
        }

        countEl.textContent = `${allCommands.length} commands available`;
        renderCommands(allCommands);
      } catch (e) {
        container.innerHTML = '<p class="loading-text">Failed to load commands. Is the bot online?</p>';
        countEl.textContent = '';
      }
    }

    function renderCommands(commands) {
      const container = document.getElementById('commands-container');
      container.innerHTML = commands.map(cmd => `
        <div class="command-card" data-name="${cmd.name.toLowerCase()}">
          <div class="command-header" onclick="this.parentElement.classList.toggle('open')">
            <span class="name">/${cmd.name}</span>
            <span class="arrow">▼</span>
          </div>
          <div class="command-body">
            <p class="desc">${cmd.description || 'No description available.'}</p>
            <button class="copy-btn" onclick="event.stopPropagation(); copyCommand('/${cmd.name}', this)">📋 Copy /${cmd.name}</button>
            ${cmd.options && cmd.options.length ? `
              <div class="param-list">
                <h4>Parameters</h4>
                ${cmd.options.map(opt => `
                  <div class="param-item">
                    <span class="pname">${opt.name}</span>
                    <span class="ptype">${opt.type === 1 ? 'subcommand' : opt.type === 2 ? 'subcommand group' : opt.type === 3 ? 'string' : opt.type === 4 ? 'number' : opt.type === 5 ? 'boolean' : opt.type === 6 ? 'user' : opt.type === 7 ? 'channel' : opt.type === 8 ? 'role' : opt.type === 9 ? 'mentionable' : opt.type === 10 ? 'integer' : opt.type === 11 ? 'attachment' : 'option'}</span>
                    ${opt.required ? '<span class="prequired">required</span>' : ''}
                    ${opt.description ? `<span class="pdesc">${opt.description}</span>` : ''}
                    ${opt.choices && opt.choices.length ? `
                      <div class="choices">
                        ${opt.choices.map(c => `<span class="choice-chip">${c.name}</span>`).join('')}
                      </div>
                    ` : ''}
                    ${opt.options ? `
                      <div class="param-list" style="margin-top:6px; margin-left:12px; border-left:1px solid rgba(255,255,255,0.05); padding-left:12px;">
                        ${opt.options.map(sub => `
                          <div class="param-item">
                            <span class="pname">${sub.name}</span>
                            <span class="ptype">${sub.type === 1 ? 'subcommand' : sub.type === 3 ? 'string' : sub.type === 4 ? 'number' : sub.type === 5 ? 'boolean' : sub.type === 6 ? 'user' : sub.type === 7 ? 'channel' : sub.type === 8 ? 'role' : sub.type === 11 ? 'attachment' : 'option'}</span>
                            ${sub.required ? '<span class="prequired">required</span>' : ''}
                            ${sub.description ? `<span class="pdesc">${sub.description}</span>` : ''}
                            ${sub.choices && sub.choices.length ? `
                              <div class="choices">
                                ${sub.choices.map(c => `<span class="choice-chip">${c.name}</span>`).join('')}
                              </div>
                            ` : ''}
                          </div>
                        `).join('')}
                      </div>
                    ` : ''}
                  </div>
                `).join('')}
              </div>
            ` : ''}
          </div>
        </div>
      `).join('');
    }

    function copyCommand(text, btn) {
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = `Copy ${text}`;
          btn.classList.remove('copied');
        }, 1500);
      });
    }

    function filterCommands() {
      const query = document.getElementById('search').value.toLowerCase();
      const filtered = allCommands.filter(cmd => cmd.name.toLowerCase().includes(query));
      renderCommands(filtered);
      document.getElementById('count').textContent = query ? `${filtered.length} results` : `${allCommands.length} commands available`;
    }

    loadCommands();
  </script>
</body>
</html>
