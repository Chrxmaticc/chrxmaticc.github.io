<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Commands — Chrxmaticc AI</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .section-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 30px;
      justify-content: center;
    }
    .section-nav button {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.5);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .section-nav button:hover {
      background: rgba(255,255,255,0.08);
      color: #fff;
    }
    .section-nav button.active {
      background: rgba(145,70,255,0.2);
      border-color: rgba(145,70,255,0.4);
      color: #fff;
    }
    .section-title {
      font-size: 1.3rem;
      background: linear-gradient(135deg, #fff, #888);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 36px 0 14px;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .section-title:first-of-type { margin-top: 0; }
  </style>
</head>
<body>
  <section class="commands-page">
    <h2>Commands</h2>
    <p class="command-count" id="count">Loading...</p>

    <!-- Section Filter Buttons -->
    <div class="section-nav" id="sectionNav">
      <button class="active" data-section="all">All</button>
      <button data-section="AI & Chat">AI & Chat</button>
      <button data-section="Fun">Fun</button>
      <button data-section="Profile & Images">Profile & Images</button>
      <button data-section="Economy & Games">Economy & Games</button>
      <button data-section="XP & Levels">XP & Levels</button>
      <button data-section="Customization">Customization</button>
      <button data-section="Moderation">Moderation</button>
      <button data-section="Embeds">Embeds</button>
      <button data-section="Utility">Utility</button>
      <button data-section="Music">Music</button>
      <button data-section="Owner">Owner</button>
    </div>

    <input type="text" class="search-box" id="search" placeholder="Search commands..." oninput="filterCommands()">
    <div id="commands-container"><p class="loading-text">Fetching commands from the bot...</p></div>
  </section>

  <script>
    // ========== COMMANDS LOGIC ==========
    let allCommands = [];
    let activeSection = 'all';

    const commandCategories = {
      "AI & Chat": ["ask", "chat", "mode", "model", "settings", "custom-interactions", "brain-dump", "clear-brain", "history", "summarize", "translate", "dream", "debate", "debate-topic", "oracle", "quote", "vibe-check"],
      "Fun": ["8ball", "coinflip", "dice", "roast", "ship", "wouldyourather", "trivia", "news", "code-generate", "binary", "qr", "poll", "weather"],
      "Profile & Images": ["avatar", "profile-spin", "profile-melt", "profile-toast", "profile-pixelate", "profile-globe", "profile-killcam", "profile-delete", "imagine"],
      "Economy & Games": ["duel", "dungeon", "dungeon-prestige", "mining", "farm", "gamble", "pet", "trade"],
      "XP & Levels": ["xp", "rank", "leaderboard"],
      "Customization": ["customize", "force-customize"],
      "Moderation": ["antinuke", "shadow-logs", "givelogs", "keyword-responder", "uwuify", "say"],
      "Embeds": ["embed"],
      "Utility": ["help", "ping", "status", "feedback", "remind-me", "birthday", "birthday-configure", "setpersonal", "mypersonal", "forgetpersonal", "guild-settings", "auto-respond", "snipe", "skill-learn", "server-persence-generate"],
      "Music": ["search", "skip", "vote-skip"],
      "Owner": ["servers", "dashboard"]
    };

    function getCommandCategory(name) {
      for (const [category, cmds] of Object.entries(commandCategories)) {
        if (cmds.includes(name)) return category;
      }
      return "Other";
    }

    async function loadCommands() {
      const container = document.getElementById('commands-container');
      const countEl = document.getElementById('count');
      try {
        const res = await fetch('https://chrxmee-ai-discord-bot.onrender.com/commands');
        allCommands = await res.json();
        if (!allCommands.length) {
          container.innerHTML = '<p class="loading-text">No commands found. Bot might be restarting.</p>';
          if (countEl) countEl.textContent = '';
          return;
        }
        if (countEl) countEl.textContent = `${allCommands.length} commands available`;
        applyFilter();
      } catch (e) {
        container.innerHTML = '<p class="loading-text">Failed to load commands. Is the bot online?</p>';
        if (countEl) countEl.textContent = '';
      }
    }

    function applyFilter() {
      const query = document.getElementById('search')?.value?.toLowerCase() || '';
      let filtered = allCommands;

      // Apply section filter
      if (activeSection !== 'all') {
        filtered = allCommands.filter(cmd => getCommandCategory(cmd.name) === activeSection);
      }

      // Apply search filter
      if (query) {
        filtered = filtered.filter(cmd => cmd.name.toLowerCase().includes(query));
      }

      renderCommands(filtered, activeSection === 'all' && !query);
      const countEl = document.getElementById('count');
      if (countEl) countEl.textContent = query
        ? `${filtered.length} results`
        : (activeSection === 'all' ? `${allCommands.length} commands available` : `${filtered.length} in ${activeSection}`);
    }

    function renderCommands(commands, showSections) {
      const container = document.getElementById('commands-container');
      if (!container) return;

      if (showSections) {
        // Grouped by category
        const grouped = {};
        commands.forEach(cmd => {
          const cat = getCommandCategory(cmd.name);
          if (!grouped[cat]) grouped[cat] = [];
          grouped[cat].push(cmd);
        });

        const categoryOrder = ["AI & Chat", "Fun", "Profile & Images", "Economy & Games", "XP & Levels", "Customization", "Moderation", "Embeds", "Utility", "Music", "Owner", "Other"];
        let html = '';
        categoryOrder.forEach(cat => {
          if (!grouped[cat] || !grouped[cat].length) return;
          html += `<h3 class="section-title">${cat} (${grouped[cat].length})</h3>`;
          html += buildCommandCards(grouped[cat]);
        });
        container.innerHTML = html || '<p class="loading-text">No commands found.</p>';
      } else {
        // Flat list
        container.innerHTML = commands.length
          ? buildCommandCards(commands)
          : '<p class="loading-text">No commands found.</p>';
      }
    }

    function buildCommandCards(commands) {
      return commands.map(cmd => `
        <div class="command-card" data-name="${cmd.name.toLowerCase()}">
          <div class="command-header" onclick="this.parentElement.classList.toggle('open')">
            <span class="name">/${cmd.name}</span>
            <span class="arrow">▼</span>
          </div>
          <div class="command-body">
            <p class="desc">${cmd.description || 'No description available.'}</p>
            <button class="copy-btn" onclick="event.stopPropagation(); copyCommand('/${cmd.name}', this)"> Copy /${cmd.name}</button>
            ${cmd.options && cmd.options.length ? buildParams(cmd.options) : ''}
          </div>
        </div>
      `).join('');
    }

    function buildParams(options) {
      return `
        <div class="param-list">
          <h4>Parameters</h4>
          ${options.map(opt => `
            <div class="param-item">
              <span class="pname">${opt.name}</span>
              <span class="ptype">${getTypeName(opt.type)}</span>
              ${opt.required ? '<span class="prequired">required</span>' : ''}
              ${opt.description ? `<span class="pdesc">${opt.description}</span>` : ''}
              ${opt.choices ? `<div class="choices">${opt.choices.map(c => `<span class="choice-chip">${c.name}</span>`).join('')}</div>` : ''}
              ${opt.options ? buildParams(opt.options) : ''}
            </div>
          `).join('')}
        </div>
      `;
    }

    function getTypeName(type) {
      const types = {
        1: 'subcommand', 2: 'subcommand group', 3: 'string', 4: 'integer',
        5: 'boolean', 6: 'user', 7: 'channel', 8: 'role', 9: 'mentionable',
        10: 'number', 11: 'attachment'
      };
      return types[type] || 'option';
    }

    function copyCommand(text, btn) {
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = `Copy ${text}`;
          btn.classList.remove('copied');
        }, 1500);
      });
    }

    function filterCommands() {
      applyFilter();
    }

    // ========== SECTION BUTTONS ==========
    document.addEventListener('DOMContentLoaded', () => {
      // Load topbar and footer from shared script if available
      if (typeof loadTopbar === 'function') loadTopbar();
      if (typeof loadFooter === 'function') loadFooter();

      // Section nav clicks
      document.querySelectorAll('#sectionNav button').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('#sectionNav button').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          activeSection = btn.dataset.section;
          document.getElementById('search').value = '';
          applyFilter();
        });
      });

      loadCommands();
    });
  </script>
</body>
</html>
