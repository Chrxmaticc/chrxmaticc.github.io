<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chrxmaticc AI</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-transition" id="transition"></div>

  <section class="hero">
    <h1>Chrxmaticc AI</h1>
    <p class="desc">a better bot than 60% of my competition</p>
    <div class="stats">
      <div class="stat-box"><h2 id="stat-servers">36</h2><p>Servers</p></div>
      <div class="stat-box"><h2 id="stat-uptime">24h</h2><p>Uptime</p></div>
      <div class="stat-box"><h2 id="stat-commands">0</h2><p>Commands</p></div>
    </div>
    <div class="ticker-section">
      <div class="ticker-row left"></div>
      <div class="ticker-row right"></div>
    </div>
    <div class="scroll-indicator">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
